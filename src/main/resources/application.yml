server:
  port: 8081

spring:
  application:
    name: babaai-core
  datasource:
    url: ${DATABASE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: SNAKE_CASE

babaai:
  jwt:
    expire-minutes: ${JWT_EXPIRE_MINUTES}
    key-path: ${JWT_KEY_PATH}
    refresh-expire-days: ${REFRESH_EXPIRE_DAYS:30}
    refresh-cookie-name: ${REFRESH_COOKIE_NAME:refresh_token}
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:true}
    refresh-cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
    refresh-cookie-path: ${REFRESH_COOKIE_PATH:/}
  cors:
    allowed-origins: ${CORS_ORIGINS}
  ai:
    base-url: ${AI_SERVICE_URL}
    service-token: ${AI_SERVICE_TOKEN}
  gateway:
    # Internal URL the gateway is reachable at (for pushing token-revocation events).
    # Auth is a signed service token (core's JWKS), so no shared secret is configured here.
    base-url: ${GATEWAY_INTERNAL_URL}
  defaults:
    min-match-percent: ${DEFAULT_MIN_MATCH_PERCENT}
    suggestion-limit: ${DEFAULT_SUGGESTION_LIMIT}
    page-size: ${DEFAULT_PAGE_SIZE}
    ingredient-category: ${DEFAULT_INGREDIENT_CATEGORY}
  config:
    ingredient-categories-path: ${INGREDIENT_CATEGORY_CONFIG_PATH:classpath:config/ingredient_categories.json}
    unit-conversion-path: ${UNIT_CONVERSION_CONFIG_PATH:classpath:config/unit_conversion.json}
    sample-recipes-path: ${SEED_RECIPES_CONFIG_PATH:classpath:config/sample_recipes.json}
    app-defaults-path: ${APP_DEFAULTS_CONFIG_PATH:classpath:config/app_defaults.json}
    recipe-categories-path: ${RECIPE_CATEGORIES_CONFIG_PATH:classpath:config/recipe_categories.json}
    ingredient-nutrition-path: ${INGREDIENT_NUTRITION_CONFIG_PATH:classpath:config/ingredient_nutrition.json}
  cache:
    enabled: ${CACHE_ENABLED:true}
    default-spec:
      maximum-size: 1000
      ttl: 10m
    specs:
      # Global catalog (PERF-1.3) — cached as a SINGLE full-catalog snapshot (one entry).
      # maximum-size is just headroom for snapshot variants; heap scales with catalog size,
      # not this number. Recipes change rarely; 10m TTL bounds view-count/ranking staleness.
      recipeCatalog:
        maximum-size: 8
        ttl: 10m
      recipeCategories:
        maximum-size: 200
        ttl: 1h
      # Semi-static config (PERF-1.4) — JsonConfigService + public config
      appConfig:
        maximum-size: 50
        ttl: 30m

logging:
  level:
    # Application logs (e.g. AiServiceClient) at INFO so they're visible in `docker logs`.
    # Override with LOG_LEVEL=DEBUG for more detail.
    com.babaai.core: ${LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info
